<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstraX Enterprise | Public Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #050406; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glow { box-shadow: 0 0 20px -5px rgba(151, 71, 255, 0.5); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto space-y-8">
        <header class="flex justify-between items-center">
            <div>
                <h1 class="text-4xl font-bold text-white tracking-tighter">ASTRAX <span class="text-purple-500">ENTERPRISE</span></h1>
                <p class="text-gray-400 text-sm">v1.2.5 Public Management Console</p>
            </div>
            <div class="flex gap-4">
                <div class="px-4 py-2 glass rounded-full flex items-center gap-2">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <span class="text-[10px] font-bold uppercase tracking-widest">Node Stable</span>
                </div>
            </div>
        </header>

        <section class="space-y-4">
            <div class="flex flex-col md:flex-row gap-4 items-center">
                <input type="text" id="searchInput" placeholder="Search commands or aliases (e.g. 'play')..." class="w-full h-12 bg-white/5 border border-white/10 rounded-xl px-6 focus:outline-none focus:border-purple-500 transition-colors">
                <button onclick="performSearch()" class="h-12 px-8 bg-purple-600 rounded-xl font-bold hover:bg-purple-500 transition-all glow">SEARCH</button>
            </div>
        </section>

        <div id="commandGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Commands injected here -->
        </div>
    </div>

    <script>
        let allCommands = [];

        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                // In a real app we'd fetch actual command details
                // For MVP we mock the UI update
            } catch (e) {}
        }

        function performSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            console.log('Searching for:', query);
            // Frontend filtering logic here
            alert('Search activated for: ' + query);
        }

        fetchStatus();
    </script>
</body>
</html>
