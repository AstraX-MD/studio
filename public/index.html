<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstraX Master Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #9747FF; --bg: #050406; --card: #0E0B13; }
        body { font-family: 'Space Grotesk', sans-serif; background-color: var(--bg); color: #fff; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(14, 11, 19, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .tab-active { color: var(--primary); border-bottom: 2px solid var(--primary); }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">
    <!-- Header -->
    <div class="flex items-center gap-4 mb-8">
        <div class="w-12 h-12 rounded-xl bg-purple-600 flex items-center justify-center shadow-[0_0_20px_rgba(151,71,255,0.4)]">
            <span class="text-2xl font-bold">A</span>
        </div>
        <div>
            <h1 class="text-2xl font-bold tracking-tighter">ASTRAX MASTER</h1>
            <p class="text-[10px] uppercase tracking-widest text-purple-400 font-bold">Node Operational</p>
        </div>
    </div>

    <!-- Tabs Nav -->
    <div class="flex border-b border-white/10 mb-6 overflow-x-auto no-scrollbar">
        <button onclick="switchTab('status')" id="t-status" class="px-4 py-2 text-sm font-bold tab-active whitespace-nowrap">STATUS</button>
        <button onclick="switchTab('features')" id="t-features" class="px-4 py-2 text-sm font-bold text-gray-500 whitespace-nowrap">FEATURES</button>
        <button onclick="switchTab('commands')" id="t-commands" class="px-4 py-2 text-sm font-bold text-gray-500 whitespace-nowrap">COMMANDS</button>
        <button onclick="switchTab('analytics')" id="t-analytics" class="px-4 py-2 text-sm font-bold text-gray-500 whitespace-nowrap">ANALYTICS</button>
    </div>

    <!-- Tab 1: Status -->
    <div id="status" class="space-y-4">
        <div class="glass p-6 rounded-2xl grid grid-cols-2 gap-4">
            <div>
                <p class="text-[10px] text-gray-500 font-bold">OWNER</p>
                <p class="text-sm font-bold" id="owner-num">Loading...</p>
            </div>
            <div>
                <p class="text-[10px] text-gray-500 font-bold">LATENCY</p>
                <p class="text-sm font-bold text-green-400" id="ping-val">Calculating...</p>
            </div>
        </div>

        <div class="glass p-6 rounded-2xl space-y-4">
            <h3 class="text-xs font-bold text-purple-400 uppercase tracking-widest">Bot Identity</h3>
            <input type="text" id="bot-name" placeholder="Bot Name" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:border-purple-500 outline-none">
            <input type="text" id="bot-prefix" placeholder="Prefix" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:border-purple-500 outline-none">
            <input type="text" id="bot-image" placeholder="Image URL" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:border-purple-500 outline-none">
            <button onclick="updateConfig()" class="w-full bg-purple-600 hover:bg-purple-700 py-4 rounded-xl font-bold text-sm transition-all active:scale-95 shadow-lg shadow-purple-900/20">DEPLOY CHANGES</button>
        </div>
    </div>

    <!-- Tab 2: Features -->
    <div id="features" class="hidden space-y-4">
        <div id="feature-list" class="space-y-2">
            <!-- Dynamic Switches -->
        </div>
    </div>

    <!-- Tab 3: Commands -->
    <div id="commands" class="hidden space-y-4">
        <div class="flex gap-2">
            <input type="text" id="search-input" placeholder="Search Logic/Alias..." class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm outline-none">
            <button onclick="searchCmd()" class="bg-purple-600 px-4 rounded-xl font-bold">GO</button>
        </div>
        <div id="cmd-list" class="space-y-2 h-[400px] overflow-y-auto pr-2">
            <!-- Dynamic Command Cards -->
        </div>
    </div>

    <!-- Tab 4: Analytics -->
    <div id="analytics" class="hidden space-y-4">
        <div class="grid grid-cols-2 gap-4">
            <div class="glass p-4 rounded-2xl text-center">
                <p class="text-3xl font-bold text-purple-500" id="total-exec">0</p>
                <p class="text-[10px] text-gray-500 font-bold uppercase">Executed</p>
            </div>
            <div class="glass p-4 rounded-2xl text-center">
                <p class="text-3xl font-bold text-red-500" id="failed-exec">0</p>
                <p class="text-[10px] text-gray-500 font-bold uppercase">Failed</p>
            </div>
        </div>
        <div class="glass p-4 rounded-2xl">
            <h3 class="text-xs font-bold text-gray-500 uppercase mb-4">Most Used Tools</h3>
            <div id="top-used" class="space-y-2"></div>
        </div>
    </div>

    <script>
        async function fetchStatus() {
            const res = await fetch('/api/status');
            const d = await res.json();
            document.getElementById('owner-num').innerText = d.owner;
            document.getElementById('ping-val').innerText = d.uptime + 's';
            document.getElementById('bot-name').value = d.botName;
            document.getElementById('bot-prefix').value = d.prefix;
            document.getElementById('bot-image').value = d.thumbnail;
        }

        async function fetchFeatures() {
            const res = await fetch('/api/features');
            const features = await res.json();
            const container = document.getElementById('feature-list');
            container.innerHTML = features.map(f => `
                <div class="glass p-4 rounded-xl flex items-center justify-between">
                    <div>
                        <p class="text-sm font-bold">${f.name}</p>
                        <p class="text-[10px] text-gray-500 uppercase">${f.category}</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" class="sr-only peer" ${f.status ? 'checked' : ''} onchange="toggleFeature('${f.category}', '${f.id}', this.checked)">
                        <div class="w-11 h-6 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-purple-600"></div>
                    </label>
                </div>
            `).join('');
        }

        async function fetchAnalytics() {
            const res = await fetch('/api/analytics');
            const d = await res.json();
            document.getElementById('total-exec').innerText = d.totalExecuted;
            document.getElementById('failed-exec').innerText = d.failed;
            document.getElementById('top-used').innerHTML = d.mostUsed.map(m => `
                <div class="flex justify-between items-center text-sm p-2 border-b border-white/5">
                    <span class="font-bold">!${m.name}</span>
                    <span class="text-purple-400 font-bold">${m.count}</span>
                </div>
            `).join('');
        }

        async function searchCmd() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const res = await fetch('/api/commands');
            const all = await res.json();
            const filtered = all.filter(c => c.name.includes(query) || c.aliases.some(a => a.includes(query)));
            document.getElementById('cmd-list').innerHTML = filtered.map(c => `
                <div class="glass p-4 rounded-xl">
                    <div class="flex justify-between items-start mb-2">
                        <p class="font-bold text-purple-400">!${c.name}</p>
                        <span class="text-[8px] border border-white/20 px-2 rounded font-bold">${c.category.toUpperCase()}</span>
                    </div>
                    <p class="text-xs text-gray-400">${c.description}</p>
                </div>
            `).join('');
        }

        function switchTab(id) {
            ['status', 'features', 'commands', 'analytics'].forEach(t => {
                document.getElementById(t).classList.add('hidden');
                document.getElementById('t-'+t).classList.remove('tab-active');
            });
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('t-'+id).classList.add('tab-active');
            if(id === 'analytics') fetchAnalytics();
            if(id === 'features') fetchFeatures();
        }

        async function updateConfig() {
            const name = document.getElementById('bot-name').value;
            const prefix = document.getElementById('bot-prefix').value;
            const thumbnail = document.getElementById('bot-image').value;
            await fetch('/api/update-config', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, prefix, thumbnail })
            });
            alert('AstraX Node Updated');
        }

        async function toggleFeature(category, id, status) {
            await fetch('/api/toggle-feature', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ category, id, status })
            });
        }

        fetchStatus();
        searchCmd();
    </script>
</body>
</html>
