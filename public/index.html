<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AstraX Master Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #050406; color: #fff; overflow-x: hidden; }
        .tab-content { display: none; padding-bottom: 80px; }
        .tab-content.active { display: block; }
        .bottom-nav { background: rgba(13, 11, 19, 0.95); backdrop-blur: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-item { color: #888; transition: 0.3s; }
        .nav-item.active { color: #9747FF; }
        .glass-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; }
        .glow-btn { background: #9747FF; box-shadow: 0 0 20px rgba(151, 71, 255, 0.4); }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #9747FF; }
        input:checked + .slider:before { transform: translateX(20px); }
        .loader { width: 12px; height: 12px; background: #9747FF; border-radius: 50%; display: inline-block; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.8); opacity: 0.5; } }
    </style>
</head>
<body class="p-4">

    <!-- Header -->
    <header class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-extrabold tracking-tighter">ASTRAX <span class="text-[#9747FF]">MD</span></h1>
            <p class="text-xs text-gray-400 font-mono" id="node-id">NODE: CLOUD-READY</p>
        </div>
        <div class="flex items-center gap-2 bg-green-500/10 px-3 py-1.5 rounded-full border border-green-500/20">
            <div class="loader"></div>
            <span class="text-[10px] font-bold text-green-500 uppercase tracking-widest">Online</span>
        </div>
    </header>

    <!-- TAB 1: HEALTH -->
    <div id="health" class="tab-content active animate-in fade-in">
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="glass-card p-4 text-center">
                <p class="text-[10px] text-gray-500 uppercase font-bold mb-1">Owner</p>
                <p class="text-sm font-mono text-[#9747FF]" id="owner-num">Not Set</p>
            </div>
            <div class="glass-card p-4 text-center">
                <p class="text-[10px] text-gray-500 uppercase font-bold mb-1">Speed</p>
                <p class="text-sm font-mono text-green-400" id="ping-val">124ms</p>
            </div>
        </div>

        <div class="glass-card p-6 space-y-6">
            <h2 class="text-lg font-bold">Update Bot Info</h2>
            
            <div class="space-y-2">
                <label class="text-[10px] text-gray-500 uppercase font-bold">Bot Name</label>
                <input type="text" id="bot-name" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm focus:outline-none focus:border-[#9747FF]" placeholder="AstraX">
            </div>

            <div class="space-y-2">
                <label class="text-[10px] text-gray-500 uppercase font-bold">Command Prefix</label>
                <input type="text" id="bot-prefix" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm focus:outline-none focus:border-[#9747FF]" placeholder="!">
            </div>

            <div class="space-y-2">
                <label class="text-[10px] text-gray-500 uppercase font-bold">Bot Image (Link)</label>
                <input type="text" id="bot-image" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm focus:outline-none focus:border-[#9747FF]" placeholder="https://...">
            </div>

            <button onclick="updateConfig()" class="w-full glow-btn p-4 rounded-2xl font-bold text-sm">Save Changes</button>
        </div>
    </div>

    <!-- TAB 2: SAFETY -->
    <div id="safety" class="tab-content animate-in fade-in">
        <h2 class="text-2xl font-bold mb-6">Warden Safety</h2>
        <div class="space-y-4" id="feature-list">
            <!-- Switches will load here -->
        </div>
    </div>

    <!-- TAB 3: COMMANDS -->
    <div id="commands" class="tab-content animate-in fade-in">
        <h2 class="text-2xl font-bold mb-4">Command Finder</h2>
        <div class="relative mb-6">
            <input type="text" id="cmd-search" onkeyup="searchCmds()" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm focus:outline-none focus:border-[#9747FF]" placeholder="Search 490+ commands...">
        </div>
        <div class="space-y-3" id="command-list">
            <!-- Commands will load here -->
        </div>
    </div>

    <!-- TAB 4: STATS -->
    <div id="stats" class="tab-content animate-in fade-in">
        <h2 class="text-2xl font-bold mb-6">Bot Analytics</h2>
        <div class="glass-card p-6 mb-6">
            <div class="flex justify-between items-center mb-4">
                <span class="text-gray-400 text-sm">Total Commands Used</span>
                <span class="text-2xl font-black text-[#9747FF]" id="total-exec">0</span>
            </div>
            <div class="w-full bg-white/5 h-2 rounded-full overflow-hidden">
                <div class="bg-[#9747FF] h-full" style="width: 75%"></div>
            </div>
        </div>

        <div class="space-y-4">
            <h3 class="text-[10px] text-gray-500 uppercase font-bold">Most Popular</h3>
            <div id="popular-cmds" class="space-y-2"></div>
        </div>

        <div class="mt-8 space-y-4">
            <h3 class="text-[10px] text-gray-500 uppercase font-bold">Live Activity</h3>
            <div class="bg-black p-4 rounded-2xl border border-white/10 h-48 overflow-y-auto font-mono text-[10px] text-gray-400 space-y-1" id="log-stream">
                <div>[SYSTEM] Log stream initialized...</div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav fixed bottom-0 left-0 right-0 h-20 px-6 flex justify-between items-center z-50">
        <button onclick="showTab('health')" class="nav-item flex flex-col items-center gap-1 active" id="btn-health">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
            <span class="text-[10px] font-bold uppercase">Health</span>
        </button>
        <button onclick="showTab('safety')" class="nav-item flex flex-col items-center gap-1" id="btn-safety">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            <span class="text-[10px] font-bold uppercase">Safety</span>
        </button>
        <button onclick="showTab('commands')" class="nav-item flex flex-col items-center gap-1" id="btn-commands">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <span class="text-[10px] font-bold uppercase">Search</span>
        </button>
        <button onclick="showTab('stats')" class="nav-item flex flex-col items-center gap-1" id="btn-stats">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
            <span class="text-[10px] font-bold uppercase">Stats</span>
        </button>
    </nav>

    <script>
        const socket = io();
        let allCommands = [];

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
        }

        async function init() {
            const status = await fetch('/api/status').then(r => r.json());
            document.getElementById('bot-name').value = status.botName;
            document.getElementById('bot-prefix').value = status.prefix;
            document.getElementById('owner-num').innerText = status.owner;
            document.getElementById('bot-image').value = status.thumbnail;

            const features = await fetch('/api/features').then(r => r.json());
            const list = document.getElementById('feature-list');
            list.innerHTML = features.map(f => `
                <div class="glass-card p-4 flex justify-between items-center">
                    <div>
                        <p class="font-bold text-sm">${f.name}</p>
                        <p class="text-[10px] text-gray-500 uppercase">${f.category}</p>
                    </div>
                    <label class="switch">
                        <input type="checkbox" ${f.status ? 'checked' : ''} onchange="toggleFeature('${f.category}', '${f.id}', this.checked)">
                        <span class="slider"></span>
                    </label>
                </div>
            `).join('');

            allCommands = await fetch('/api/commands').then(r => r.json());
            renderCmds(allCommands);

            const stats = await fetch('/api/analytics').then(r => r.json());
            document.getElementById('total-exec').innerText = stats.totalExecuted;
            document.getElementById('popular-cmds').innerHTML = stats.mostUsed.map(c => `
                <div class="flex justify-between text-xs p-2 bg-white/5 rounded-lg">
                    <span class="text-gray-300">!${c.name}</span>
                    <span class="font-bold text-[#9747FF]">${c.count} hits</span>
                </div>
            `).join('');
        }

        function renderCmds(cmds) {
            const list = document.getElementById('command-list');
            list.innerHTML = cmds.map(c => `
                <div class="glass-card p-4">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[#9747FF] font-black">!${c.name}</span>
                        <span class="text-[8px] bg-white/10 px-2 py-0.5 rounded-full uppercase">${c.category}</span>
                    </div>
                    <p class="text-[10px] text-gray-400 mb-2">${c.description}</p>
                    <p class="text-[8px] text-gray-600 font-mono">Aliases: ${c.aliases.join(', ') || 'None'}</p>
                </div>
            `).join('');
        }

        function searchCmds() {
            const query = document.getElementById('cmd-search').value.toLowerCase();
            const filtered = allCommands.filter(c => c.name.includes(query) || c.description.toLowerCase().includes(query));
            renderCmds(filtered);
        }

        async function toggleFeature(category, id, status) {
            await fetch('/api/toggle-feature', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ category, id, status })
            });
        }

        async function updateConfig() {
            const name = document.getElementById('bot-name').value;
            const prefix = document.getElementById('bot-prefix').value;
            const thumbnail = document.getElementById('bot-image').value;
            await fetch('/api/update-config', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, prefix, thumbnail })
            });
            alert('Settings saved!');
        }

        socket.on('telemetry', data => {
            const log = document.getElementById('log-stream');
            const div = document.createElement('div');
            div.innerText = `[LOG] ${new Date().toLocaleTimeString()} | RAM: ${data.ram}MB | Uptime: ${data.uptime}s`;
            log.prepend(div);
            if (log.children.length > 50) log.lastChild.remove();
        });

        init();
    </script>
</body>
</html>
