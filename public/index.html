<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AstraX Enterprise | Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #050406;
            color: #fff;
            overflow-x: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .active-tab {
            color: #9747FF;
            border-top: 2px solid #9747FF;
        }
        .glow-primary {
            box-shadow: 0 0 20px rgba(151, 71, 255, 0.2);
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #9747FF; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <!-- Header -->
    <header class="p-6 flex justify-between items-center sticky top-0 bg-[#050406]/80 backdrop-blur-md z-50">
        <div>
            <h1 class="text-2xl font-bold tracking-tighter">ASTRAX <span class="text-[#9747FF]">CORE</span></h1>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest">Enterprise Node v2.4</p>
        </div>
        <div id="connection-status" class="w-3 h-3 rounded-full bg-yellow-500 animate-pulse"></div>
    </header>

    <!-- Main Content -->
    <main id="app" class="p-6 space-y-6">
        
        <!-- Overview Tab -->
        <section id="tab-overview" class="tab-content space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="glass p-4 rounded-3xl space-y-1">
                    <p class="text-[10px] text-gray-400 uppercase">Status</p>
                    <h3 id="bot-status" class="text-lg font-bold">Offline</h3>
                </div>
                <div class="glass p-4 rounded-3xl space-y-1">
                    <p class="text-[10px] text-gray-400 uppercase">Uptime</p>
                    <h3 id="bot-uptime" class="text-lg font-bold">0s</h3>
                </div>
                <div class="glass p-4 rounded-3xl space-y-1">
                    <p class="text-[10px] text-gray-400 uppercase">RAM Usage</p>
                    <h3 id="bot-ram" class="text-lg font-bold">0%</h3>
                </div>
                <div class="glass p-4 rounded-3xl space-y-1">
                    <p class="text-[10px] text-gray-400 uppercase">Total Commands</p>
                    <h3 id="bot-cmds" class="text-lg font-bold">0</h3>
                </div>
            </div>

            <div class="glass p-6 rounded-[2rem] space-y-4">
                <h2 class="text-xl font-bold">Quick Controls</h2>
                <div class="grid grid-cols-1 gap-3">
                    <button onclick="updateSetting('core', 'maintenance', true)" class="w-full p-4 rounded-2xl bg-red-500/10 border border-red-500/20 text-red-500 text-left font-medium">Emergency Lockdown</button>
                    <button onclick="location.reload()" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 text-left font-medium">Refresh Dashboard</button>
                </div>
            </div>
        </section>

        <!-- Settings Tab -->
        <section id="tab-settings" class="tab-content hidden space-y-6">
            <div class="glass p-6 rounded-[2rem] space-y-6">
                <h2 class="text-xl font-bold">Core Configuration</h2>
                
                <div class="space-y-4">
                    <div class="space-y-2">
                        <label class="text-xs text-gray-400 uppercase">Command Prefix</label>
                        <input id="set-prefix" type="text" placeholder="!" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:outline-none focus:border-[#9747FF]">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs text-gray-400 uppercase">Bot Name</label>
                        <input id="set-name" type="text" placeholder="AstraX" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:outline-none focus:border-[#9747FF]">
                    </div>
                    <button onclick="saveCoreSettings()" class="w-full p-4 bg-[#9747FF] rounded-2xl font-bold glow-primary">Save Changes</button>
                </div>
            </div>
        </section>

        <!-- Commands Tab -->
        <section id="tab-commands" class="tab-content hidden space-y-6">
            <div class="glass p-6 rounded-[2rem]">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold">Modules</h2>
                    <input type="text" id="cmd-search" placeholder="Search..." class="bg-white/5 border border-white/10 px-4 py-2 rounded-xl text-sm outline-none">
                </div>
                <div id="commands-list" class="space-y-2 max-h-[60vh] overflow-y-auto pr-2">
                    <!-- Dynamic List -->
                </div>
            </div>
        </section>

    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 glass h-20 px-6 flex justify-around items-center rounded-t-[2rem] z-50">
        <button onclick="switchTab('overview')" id="btn-overview" class="flex flex-col items-center gap-1 p-2 active-tab">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
            <span class="text-[10px] font-medium">Overview</span>
        </button>
        <button onclick="switchTab('settings')" id="btn-settings" class="flex flex-col items-center gap-1 p-2 text-gray-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
            <span class="text-[10px] font-medium">Settings</span>
        </button>
        <button onclick="switchTab('commands')" id="btn-commands" class="flex flex-col items-center gap-1 p-2 text-gray-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            <span class="text-[10px] font-medium">Commands</span>
        </button>
    </nav>

    <script>
        const socket = io();
        let commandsData = [];

        // Real-time Telemetry
        socket.on('telemetry', (data) => {
            document.getElementById('bot-ram').innerText = data.ram + 'MB';
            document.getElementById('bot-uptime').innerText = data.uptime + 's';
        });

        // Initialize Data
        async function init() {
            const statusRes = await fetch('/api/status');
            const status = await statusRes.json();
            
            document.getElementById('bot-status').innerText = status.status.toUpperCase();
            document.getElementById('bot-cmds').innerText = status.commands;
            document.getElementById('set-prefix').value = status.prefix;
            document.getElementById('set-name').value = status.botName;
            
            if(status.status === 'online') {
                document.getElementById('connection-status').classList.remove('bg-yellow-500');
                document.getElementById('connection-status').classList.add('bg-green-500');
            }

            const cmdRes = await fetch('/api/commands');
            commandsData = await cmdRes.json();
            renderCommands(commandsData);
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab', 'text-[#9747FF]'));
            document.getElementById(`btn-${tab}`).classList.add('active-tab');
        }

        function renderCommands(list) {
            const container = document.getElementById('commands-list');
            container.innerHTML = list.map(cmd => `
                <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/5">
                    <div>
                        <h4 class="font-bold text-sm">!${cmd.name}</h4>
                        <p class="text-[10px] text-gray-400">${cmd.category}</p>
                    </div>
                    <button onclick="toggleCommand('${cmd.name}')" class="text-[10px] bg-white/10 px-3 py-1 rounded-full uppercase font-bold">Enabled</button>
                </div>
            `).join('');
        }

        async function saveCoreSettings() {
            const prefix = document.getElementById('set-prefix').value;
            const name = document.getElementById('set-name').value;
            
            await fetch('/api/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ category: 'core', key: 'prefix', value: prefix })
            });
            
            await fetch('/api/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ category: 'core', key: 'name', value: name })
            });

            alert('Settings Synced with Bot Node.');
        }

        init();
    </script>
</body>
</html>
