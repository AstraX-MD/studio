<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstraX Enterprise | Public Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background: #050406; color: #fff; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .glow { box-shadow: 0 0 20px rgba(151, 71, 255, 0.3); }
        .primary-text { color: #9747FF; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-6xl mx-auto space-y-12">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h1 class="text-5xl font-bold tracking-tighter">ASTRAX <span class="primary-text">EXPERT</span></h1>
                <p class="text-gray-500 uppercase tracking-widest text-xs mt-2">v1.2.5 Operational Node</p>
            </div>
            <div class="flex gap-4">
                <div class="glass px-6 py-3 rounded-2xl flex items-center gap-3">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <span class="text-sm font-bold uppercase">Cloud Online</span>
                </div>
            </div>
        </div>

        <!-- Search Hub -->
        <div class="glass p-8 rounded-3xl space-y-6 glow">
            <h2 class="text-2xl font-bold">Plugin Marketplace</h2>
            <div class="flex gap-3">
                <input type="text" id="searchInput" placeholder="Search by name, alias or category (e.g. 'play', 'ai')..." 
                    class="w-full bg-white/5 border border-white/10 rounded-xl px-6 py-4 outline-none focus:border-purple-500 transition-all">
                <button onclick="filterCommands()" class="bg-[#9747FF] px-8 rounded-xl font-bold hover:opacity-80 transition-all">SEARCH</button>
            </div>
            <div id="commandGrid" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <!-- Commands inject here -->
            </div>
        </div>
    </div>

    <script>
        const commands = [
            { name: 'gpt4', aliases: ['openai', 'ai'], desc: 'Advanced AI reasoning swarm.' },
            { name: 'play', aliases: ['song', 'ytmp3'], desc: 'High-speed music downloader.' },
            { name: 'tiktok', aliases: ['tt', 'ttdl'], desc: 'Watermark-free video downloader.' },
            { name: 'imagine', aliases: ['draw', 'flux'], desc: 'High-fidelity AI image generation.' },
            { name: 'warden', aliases: ['security'], desc: 'Stealth monitoring and protection.' },
            { name: 'economy', aliases: ['bank', 'bal'], desc: 'Global financial RPG system.' }
        ];

        function render(list) {
            const grid = document.getElementById('commandGrid');
            grid.innerHTML = list.map(c => `
                <div class="glass p-6 rounded-2xl border-l-4 border-purple-500">
                    <h3 class="font-bold text-lg">!${c.name}</h3>
                    <p class="text-gray-400 text-sm mt-1">${c.desc}</p>
                    <div class="mt-4 flex gap-2 flex-wrap">
                        ${c.aliases.map(a => `<span class="text-[10px] bg-white/5 px-2 py-1 rounded-md text-purple-400 font-bold uppercase">${a}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function filterCommands() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = commands.filter(c => 
                c.name.includes(query) || 
                c.aliases.some(a => a.includes(query)) || 
                c.desc.toLowerCase().includes(query)
            );
            render(filtered);
        }

        render(commands);
    </script>
</body>
</html>
