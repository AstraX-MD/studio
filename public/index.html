<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AstraX Bot Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050406; color: #fff; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; }
        .tab-btn.active { color: #9747FF; border-top: 2px solid #9747FF; }
        .bottom-nav { background: #0A0A0C; border-top: 1px solid rgba(255, 255, 255, 0.1); }
        .glow { box-shadow: 0 0 15px rgba(151, 71, 255, 0.3); }
        input, select { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: #fff; padding: 8px 12px; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #9747FF; border-radius: 10px; }
    </style>
</head>
<body class="pb-24">
    <!-- Header -->
    <header class="p-4 flex items-center justify-between sticky top-0 bg-[#050406] z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-purple-600 flex items-center justify-center glow">
                <i data-lucide="zap" class="text-white w-6 h-6"></i>
            </div>
            <div>
                <h1 class="font-bold text-lg leading-tight" id="headerBotName">AstraX</h1>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest font-mono">System Active</p>
            </div>
        </div>
        <div class="flex items-center gap-2 px-3 py-1 bg-green-500/10 border border-green-500/20 rounded-full">
            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
            <span class="text-[10px] font-bold text-green-500 uppercase tracking-tighter">Live</span>
        </div>
    </header>

    <main class="p-4 max-w-lg mx-auto">
        <!-- Tab 1: Bot Health -->
        <div id="view-health" class="view space-y-6">
            <section class="grid grid-cols-2 gap-4">
                <div class="glass p-4">
                    <p class="text-[10px] text-gray-400 uppercase">Memory Used</p>
                    <h3 class="text-xl font-bold" id="statRAM">0 MB</h3>
                </div>
                <div class="glass p-4">
                    <p class="text-[10px] text-gray-400 uppercase">Ping Speed</p>
                    <h3 class="text-xl font-bold text-green-400" id="statPing">-- ms</h3>
                </div>
            </section>

            <section class="glass p-5 space-y-4">
                <h2 class="font-bold text-purple-400 flex items-center gap-2">
                    <i data-lucide="settings" class="w-4 h-4"></i> Simple Settings
                </h2>
                <div class="space-y-3">
                    <div class="flex flex-col gap-1">
                        <label class="text-xs text-gray-400">Bot Name</label>
                        <input type="text" id="inputName" placeholder="AstraX">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-xs text-gray-400">Prefix (eg ! or .)</label>
                        <input type="text" id="inputPrefix" placeholder="!">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-xs text-gray-400">Bot Image URL</label>
                        <input type="text" id="inputImage" placeholder="https://...">
                    </div>
                    <button onclick="updateSettings()" class="w-full py-3 bg-purple-600 rounded-xl font-bold mt-2 hover:bg-purple-700 active:scale-95 transition-all">Save Changes</button>
                </div>
            </section>

            <section class="glass p-5">
                <h2 class="font-bold text-purple-400 mb-4 flex items-center gap-2">
                    <i data-lucide="user" class="w-4 h-4"></i> Bot Identity
                </h2>
                <div class="flex justify-between items-center py-2 border-b border-white/5">
                    <span class="text-sm text-gray-400">Owner ID</span>
                    <span class="text-sm font-mono" id="statOwner">--</span>
                </div>
                <div class="flex justify-between items-center py-2">
                    <span class="text-sm text-gray-400">Total Code Files</span>
                    <span class="text-sm font-mono" id="statModules">--</span>
                </div>
            </section>
        </div>

        <!-- Tab 2: Safety Switches -->
        <div id="view-safety" class="view hidden space-y-4">
            <h2 class="text-2xl font-bold mb-4">Safety Switches</h2>
            <div id="featureList" class="space-y-3">
                <!-- Features Load Here -->
                <div class="animate-pulse flex space-x-4 glass p-4">
                    <div class="flex-1 space-y-4 py-1">
                        <div class="h-4 bg-white/5 rounded w-3/4"></div>
                        <div class="h-4 bg-white/5 rounded"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab 3: Command List -->
        <div id="view-commands" class="view hidden space-y-4">
            <div class="sticky top-16 bg-[#050406] pt-2 pb-4">
                <h2 class="text-2xl font-bold mb-4">Command Finder</h2>
                <div class="relative">
                    <i data-lucide="search" class="absolute left-3 top-3 w-4 h-4 text-gray-500"></i>
                    <input type="text" id="searchCmd" onkeyup="filterCommands()" placeholder="Search 490+ commands..." class="w-full pl-10 h-12">
                </div>
            </div>
            <div id="commandContainer" class="space-y-3 pb-4">
                <!-- Commands Load Here -->
            </div>
        </div>

        <!-- Tab 4: Bot History -->
        <div id="view-history" class="view hidden space-y-6">
            <h2 class="text-2xl font-bold">Bot Numbers</h2>
            <section class="grid grid-cols-2 gap-4">
                <div class="glass p-4 bg-purple-500/5">
                    <p class="text-[10px] text-gray-400 uppercase">Usage Total</p>
                    <h3 class="text-2xl font-bold" id="statTotalUse">0</h3>
                </div>
                <div class="glass p-4 bg-red-500/5">
                    <p class="text-[10px] text-gray-400 uppercase">Errors/Fails</p>
                    <h3 class="text-2xl font-bold text-red-400" id="statFailed">0</h3>
                </div>
            </section>

            <section class="glass p-5">
                <h2 class="font-bold text-purple-400 mb-3">Popular Commands</h2>
                <div id="mostUsedList" class="space-y-2">
                    <!-- Populated via API -->
                </div>
            </section>

            <section class="space-y-3">
                <h2 class="font-bold text-purple-400 px-2">Live Activity</h2>
                <div id="terminal" class="glass p-4 h-64 overflow-y-auto font-mono text-[10px] space-y-1">
                    <div class="text-gray-500">>> Waiting for activity...</div>
                </div>
            </section>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav fixed bottom-0 left-0 right-0 h-20 flex items-center justify-around px-4 z-50">
        <button onclick="showTab('health')" class="tab-btn flex flex-col items-center gap-1 active" id="btn-health">
            <i data-lucide="activity" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold uppercase">Health</span>
        </button>
        <button onclick="showTab('safety')" class="tab-btn flex flex-col items-center gap-1" id="btn-safety">
            <i data-lucide="shield-check" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold uppercase">Safety</span>
        </button>
        <button onclick="showTab('commands')" class="tab-btn flex flex-col items-center gap-1" id="btn-commands">
            <i data-lucide="layers" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold uppercase">Library</span>
        </button>
        <button onclick="showTab('history')" class="tab-btn flex flex-col items-center gap-1" id="btn-history">
            <i data-lucide="bar-chart-3" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold uppercase">History</span>
        </button>
    </nav>

    <script>
        const socket = io();
        let allCommands = [];

        // Tab Switching Logic
        function showTab(tabId) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(`view-${tabId}`).classList.remove('hidden');
            document.getElementById(`btn-${tabId}`).classList.add('active');

            if (tabId === 'safety') loadFeatures();
            if (tabId === 'commands') loadCommands();
            if (tabId === 'history') loadAnalytics();
        }

        // Live Telemetry
        socket.on('telemetry', (data) => {
            document.getElementById('statRAM').innerText = data.ram + ' MB';
            const logEntry = document.createElement('div');
            logEntry.className = 'text-green-500 opacity-80';
            logEntry.innerHTML = `<span class="text-gray-600">[${new Date().toLocaleTimeString()}]</span> Node Pulse: OK | CPU: ${data.cpu}%`;
            const term = document.getElementById('terminal');
            term.appendChild(logEntry);
            term.scrollTop = term.scrollHeight;
        });

        // Load Status (Tab 1)
        async function loadStatus() {
            const res = await fetch('/api/status');
            const data = await res.json();
            document.getElementById('headerBotName').innerText = data.botName;
            document.getElementById('inputName').value = data.botName;
            document.getElementById('inputPrefix').value = data.prefix;
            document.getElementById('inputImage').value = data.thumbnail;
            document.getElementById('statOwner').innerText = '+' + data.owner;
            document.getElementById('statModules').innerText = data.uniqueModules;
            
            const start = Date.now();
            fetch('/api/status').then(() => {
                document.getElementById('statPing').innerText = (Date.now() - start) + ' ms';
            });
        }

        async function updateSettings() {
            const name = document.getElementById('inputName').value;
            const prefix = document.getElementById('inputPrefix').value;
            const thumbnail = document.getElementById('inputImage').value;

            await fetch('/api/update-config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, prefix, thumbnail })
            });
            alert('Settings updated!');
            loadStatus();
        }

        // Tab 2 Features
        async function loadFeatures() {
            const res = await fetch('/api/features');
            const data = await res.json();
            const list = document.getElementById('featureList');
            list.innerHTML = '';
            
            data.forEach(f => {
                const item = document.createElement('div');
                item.className = 'glass p-4 flex items-center justify-between';
                item.innerHTML = `
                    <div>
                        <p class="font-bold text-sm">${f.name}</p>
                        <p class="text-[10px] text-gray-500 uppercase">${f.category}</p>
                    </div>
                    <button onclick="toggleFeature('${f.category}', '${f.id}', ${!f.status})" 
                        class="px-4 py-2 rounded-lg text-xs font-bold ${f.status ? 'bg-green-600 text-white' : 'bg-white/10 text-gray-400'}">
                        ${f.status ? 'ON' : 'OFF'}
                    </button>
                `;
                list.appendChild(item);
            });
        }

        async function toggleFeature(category, id, status) {
            await fetch('/api/toggle-feature', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ category, id, status })
            });
            loadFeatures();
        }

        // Tab 3 Commands
        async function loadCommands() {
            const res = await fetch('/api/commands');
            allCommands = await res.json();
            renderCommands(allCommands);
        }

        function renderCommands(cmds) {
            const cont = document.getElementById('commandContainer');
            cont.innerHTML = '';
            cmds.forEach(c => {
                const card = document.createElement('div');
                card.className = 'glass p-4 space-y-1';
                card.innerHTML = `
                    <div class="flex justify-between">
                        <h4 class="font-bold text-purple-400">!${c.name}</h4>
                        <span class="text-[9px] bg-white/5 px-2 py-1 rounded text-gray-500 uppercase">${c.category}</span>
                    </div>
                    <p class="text-xs text-gray-300">${c.description}</p>
                    <p class="text-[9px] text-gray-500 italic">Aliases: ${c.aliases.join(', ') || 'None'}</p>
                `;
                cont.appendChild(card);
            });
        }

        function filterCommands() {
            const q = document.getElementById('searchCmd').value.toLowerCase();
            const filtered = allCommands.filter(c => 
                c.name.toLowerCase().includes(q) || 
                c.description.toLowerCase().includes(q) ||
                c.category.toLowerCase().includes(q)
            );
            renderCommands(filtered);
        }

        // Tab 4 Analytics
        async function loadAnalytics() {
            const res = await fetch('/api/analytics');
            const data = await res.json();
            document.getElementById('statTotalUse').innerText = data.totalExecuted;
            document.getElementById('statFailed').innerText = data.failed;

            const mostUsed = document.getElementById('mostUsedList');
            mostUsed.innerHTML = '';
            data.mostUsed.forEach(item => {
                const row = document.createElement('div');
                row.className = 'flex items-center justify-between text-xs py-1';
                row.innerHTML = `<span class="text-gray-400">!${item.name}</span> <span class="font-mono text-purple-400">${item.count} times</span>`;
                mostUsed.appendChild(row);
            });
        }

        // Init
        lucide.createIcons();
        loadStatus();
    </script>
</body>
</html>
