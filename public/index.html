<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AstraX Health Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #050406; color: white; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .active-tab { color: #9747FF; }
        .tab-indicator { height: 4px; width: 20px; background: #9747FF; border-radius: 10px; margin-top: 4px; display: none; }
        .active-tab .tab-indicator { display: block; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 75px; background: #0A0A0C; border-top: 1px solid #1A1A1A; z-index: 100; }
        input, select { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 12px; width: 100%; color: white; outline: none; }
        .glow { box-shadow: 0 0 15px -5px #9747FF; }
        .switch { width: 44px; height: 24px; background: #333; border-radius: 20px; position: relative; transition: .3s; cursor: pointer; }
        .switch-on { background: #9747FF; }
        .knob { width: 18px; height: 18px; background: white; border-radius: 50%; position: absolute; top: 3px; left: 3px; transition: .3s; }
        .switch-on .knob { left: 23px; }
    </style>
</head>
<body class="pb-24">
    <div class="p-6 max-w-lg mx-auto space-y-6">
        <!-- Header -->
        <div class="flex items-center justify-between">
            <div>
                <h1 id="botNameTitle" class="text-3xl font-black tracking-tighter">ASTRAX</h1>
                <p class="text-[10px] uppercase tracking-widest text-white/40 font-semibold">Node Status: <span id="statusBadge" class="text-green-500">Checking...</span></p>
            </div>
            <img id="botAvatar" src="https://i.ibb.co/QvGY7dqB/file-00000000e1107243ad54749c06fe2d80.png" class="w-14 h-14 rounded-2xl glow object-cover">
        </div>

        <!-- TABS CONTENT -->
        <div id="tab-health" class="tab-pane space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="glass p-4 rounded-3xl space-y-1">
                    <p class="text-[10px] text-white/40 uppercase font-bold">Bot Speed</p>
                    <p id="pingVal" class="text-2xl font-black">-- ms</p>
                </div>
                <div class="glass p-4 rounded-3xl space-y-1">
                    <p class="text-[10px] text-white/40 uppercase font-bold">Total Tools</p>
                    <p id="toolCount" class="text-2xl font-black">--</p>
                </div>
            </div>

            <div class="glass p-6 rounded-[32px] space-y-4">
                <h3 class="font-bold flex items-center gap-2">🛠️ Setup Bot</h3>
                <div class="space-y-3">
                    <div>
                        <p class="text-[10px] text-white/40 mb-1 ml-1 uppercase font-bold">New Bot Name</p>
                        <input type="text" id="inputName" placeholder="Enter name...">
                    </div>
                    <div>
                        <p class="text-[10px] text-white/40 mb-1 ml-1 uppercase font-bold">New Prefix</p>
                        <input type="text" id="inputPrefix" placeholder="Example: !">
                    </div>
                    <div>
                        <p class="text-[10px] text-white/40 mb-1 ml-1 uppercase font-bold">New Image Link</p>
                        <input type="text" id="inputImage" placeholder="Paste URL here...">
                    </div>
                    <button onclick="updateConfig()" class="w-full bg-[#9747FF] p-4 rounded-2xl font-black text-sm tracking-widest uppercase glow mt-2">Save Changes</button>
                </div>
            </div>
        </div>

        <div id="tab-safety" class="tab-pane hidden space-y-4">
            <h2 class="text-xl font-bold ml-1">Warden Guard</h2>
            <div id="featureList" class="space-y-3">
                <!-- Features generated here -->
            </div>
        </div>

        <div id="tab-tools" class="tab-pane hidden space-y-4">
            <input type="text" id="searchCmd" placeholder="Search commands..." onkeyup="filterCommands()">
            <div id="commandList" class="space-y-2">
                <!-- Commands generated here -->
            </div>
        </div>

        <div id="tab-stats" class="tab-pane hidden space-y-6">
            <div class="glass p-6 rounded-[32px] space-y-4">
                <h3 class="font-bold">Execution Report</h3>
                <div class="grid grid-cols-2 gap-4 border-b border-white/5 pb-4">
                    <div>
                        <p id="statTotal" class="text-2xl font-black">0</p>
                        <p class="text-[10px] text-white/40 font-bold uppercase">Success</p>
                    </div>
                    <div>
                        <p id="statFailed" class="text-2xl font-black text-red-500">0</p>
                        <p class="text-[10px] text-white/40 font-bold uppercase">Fails</p>
                    </div>
                </div>
                <div id="topCommands" class="space-y-2">
                    <p class="text-[10px] text-white/40 font-bold uppercase">Top Features</p>
                    <!-- Most used here -->
                </div>
            </div>
            
            <div class="space-y-2">
                <p class="text-[10px] text-white/40 font-bold uppercase ml-1">Live Activity</p>
                <div id="logs" class="bg-black/50 p-4 rounded-2xl font-mono text-[10px] h-40 overflow-y-auto text-white/70 space-y-1">
                    <!-- Logs stream here -->
                </div>
            </div>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav flex items-center justify-around px-4">
        <button onclick="showTab('health')" class="tab-btn active-tab flex flex-col items-center" id="btn-health">
            <span class="text-xl">❤️</span>
            <span class="text-[10px] font-bold mt-1">Health</span>
            <div class="tab-indicator mx-auto"></div>
        </button>
        <button onclick="showTab('safety')" class="tab-btn flex flex-col items-center" id="btn-safety">
            <span class="text-xl">🛡️</span>
            <span class="text-[10px] font-bold mt-1">Safety</span>
            <div class="tab-indicator mx-auto"></div>
        </button>
        <button onclick="showTab('tools')" class="tab-btn flex flex-col items-center" id="btn-tools">
            <span class="text-xl">📦</span>
            <span class="text-[10px] font-bold mt-1">Tools</span>
            <div class="tab-indicator mx-auto"></div>
        </button>
        <button onclick="showTab('stats')" class="tab-btn flex flex-col items-center" id="btn-stats">
            <span class="text-xl">📊</span>
            <span class="text-[10px] font-bold mt-1">Stats</span>
            <div class="tab-indicator mx-auto"></div>
        </button>
    </div>

    <script>
        let allCommands = [];

        function showTab(id) {
            document.querySelectorAll('.tab-pane').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active-tab'));
            document.getElementById('tab-' + id).classList.remove('hidden');
            document.getElementById('btn-' + id).classList.add('active-tab');
        }

        async function refresh() {
            const res = await fetch('/api/status');
            const data = await res.json();
            document.getElementById('botNameTitle').innerText = data.botName.toUpperCase();
            document.getElementById('pingVal').innerText = '142 ms'; // Mock ping
            document.getElementById('toolCount').innerText = data.uniqueModules;
            document.getElementById('botAvatar').src = data.thumbnail;
            document.getElementById('statusBadge').innerText = data.status.toUpperCase();
            document.getElementById('statusBadge').className = data.status === 'online' ? 'text-green-500' : 'text-yellow-500';

            // Commands
            const cmdRes = await fetch('/api/commands');
            allCommands = await cmdRes.json();
            renderCommands(allCommands);

            // Features
            const featRes = await fetch('/api/features');
            const features = await featRes.json();
            renderFeatures(features);

            // Stats
            const statRes = await fetch('/api/analytics');
            const stats = await statRes.json();
            document.getElementById('statTotal').innerText = stats.totalExecuted;
            document.getElementById('statFailed').innerText = stats.failed;
            
            let topHtml = '';
            stats.mostUsed.forEach(item => {
                topHtml += `<div class="flex justify-between text-xs font-bold py-1"><span>${item.name}</span><span class="text-[#9747FF]">${item.count}</span></div>`;
            });
            document.getElementById('topCommands').innerHTML = topHtml;
        }

        function renderFeatures(feats) {
            let html = '';
            feats.forEach(f => {
                html += `
                <div class="glass p-4 rounded-2xl flex items-center justify-between">
                    <div>
                        <p class="font-bold text-sm">${f.name}</p>
                        <p class="text-[10px] text-white/40 uppercase font-bold">${f.category}</p>
                    </div>
                    <div class="switch ${f.status ? 'switch-on' : ''}" onclick="toggleFeature('${f.category}', '${f.id}', ${!f.status})">
                        <div class="knob"></div>
                    </div>
                </div>`;
            });
            document.getElementById('featureList').innerHTML = html;
        }

        function renderCommands(cmds) {
            let html = '';
            cmds.forEach(c => {
                html += `
                <div class="glass p-3 rounded-xl">
                    <p class="text-sm font-black text-[#9747FF]">${c.name.toUpperCase()}</p>
                    <p class="text-[10px] text-white/60">${c.description}</p>
                </div>`;
            });
            document.getElementById('commandList').innerHTML = html;
        }

        function filterCommands() {
            const query = document.getElementById('searchCmd').value.toLowerCase();
            const filtered = allCommands.filter(c => c.name.toLowerCase().includes(query) || c.category.toLowerCase().includes(query));
            renderCommands(filtered);
        }

        async function toggleFeature(cat, id, status) {
            await fetch('/api/toggle-feature', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ category: cat, id, status })
            });
            refresh();
        }

        async function updateConfig() {
            const name = document.getElementById('inputName').value;
            const prefix = document.getElementById('inputPrefix').value;
            const thumbnail = document.getElementById('inputImage').value;
            await fetch('/api/update-config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, prefix, thumbnail })
            });
            alert('Settings Saved!');
            refresh();
        }

        setInterval(refresh, 5000);
        refresh();
    </script>
</body>
</html>
