<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstraX | Master Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #050406; color: #fff; }
        .tab-btn { padding: 12px 20px; font-weight: 600; color: #888; border-bottom: 2px solid transparent; transition: 0.3s; }
        .tab-btn.active { color: #9747FF; border-bottom: 2px solid #9747FF; }
        .card { background: #0e0b13; border: 1px solid #1f1f1f; border-radius: 12px; padding: 20px; }
        .input-field { background: #16121d; border: 1px solid #221d2b; border-radius: 8px; padding: 10px; width: 100%; color: #fff; }
        .btn-save { background: #9747FF; padding: 12px; border-radius: 8px; font-weight: 800; width: 100%; margin-top: 10px; }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <!-- Header -->
    <div class="flex items-center gap-4 mb-8">
        <div class="w-12 h-12 bg-[#9747FF] rounded-xl flex items-center justify-center font-black text-2xl">A</div>
        <div>
            <h1 class="text-2xl font-black tracking-tighter">ASTRAX</h1>
            <p class="text-xs text-gray-500 font-mono uppercase">Master Console v1.2.5</p>
        </div>
    </div>

    <!-- Navigation Tabs -->
    <div class="flex border-b border-[#1f1f1f] mb-6 overflow-x-auto no-scrollbar">
        <button class="tab-btn active" onclick="showTab('status')">HOME</button>
        <button class="tab-btn" onclick="showTab('features')">SAFETY</button>
        <button class="tab-btn" onclick="showTab('commands')">SEARCH</button>
        <button class="tab-btn" onclick="showTab('analytics')">STATS</button>
    </div>

    <!-- Tab 1: Status & Settings -->
    <div id="tab-status" class="tab-content space-y-4">
        <div class="card grid grid-cols-2 gap-4">
            <div>
                <p class="text-[10px] text-gray-500 uppercase font-mono">Owner</p>
                <p id="owner-num" class="font-bold">...</p>
            </div>
            <div>
                <p class="text-[10px] text-gray-500 uppercase font-mono">Speed</p>
                <p id="ping-val" class="font-bold text-green-500">...</p>
            </div>
        </div>

        <div class="card">
            <h3 class="font-bold mb-4">Edit Bot Identity</h3>
            <div class="space-y-3">
                <div>
                    <label class="text-[10px] text-gray-500 uppercase">Bot Name</label>
                    <input id="in-name" type="text" class="input-field" placeholder="AstraX">
                </div>
                <div>
                    <label class="text-[10px] text-gray-500 uppercase">Prefix</label>
                    <input id="in-prefix" type="text" class="input-field" placeholder="!">
                </div>
                <div>
                    <label class="text-[10px] text-gray-500 uppercase">Bot Image (Link)</label>
                    <input id="in-image" type="text" class="input-field" placeholder="https://...">
                </div>
                <button class="btn-save" onclick="updateConfig()">SAVE CHANGES</button>
            </div>
        </div>
    </div>

    <!-- Tab 2: Feature Toggles -->
    <div id="tab-features" class="tab-content hidden space-y-3">
        <div id="feature-list">
            <!-- Toggles will be injected here -->
        </div>
    </div>

    <!-- Tab 3: Command Directory -->
    <div id="tab-commands" class="tab-content hidden space-y-4">
        <div class="flex gap-2">
            <input id="cmd-search" type="text" class="input-field" placeholder="Search commands...">
            <button onclick="searchCmds()" class="bg-[#1f1f1f] px-4 rounded-lg">FIND</button>
        </div>
        <div id="cmd-list" class="space-y-2">
            <!-- Commands injected here -->
        </div>
    </div>

    <!-- Tab 4: Analytics -->
    <div id="tab-analytics" class="tab-content hidden space-y-4">
        <div class="card text-center">
            <p class="text-4xl font-black text-[#9747FF]" id="total-exec">0</p>
            <p class="text-[10px] text-gray-500 uppercase font-mono">Total Commands Sent</p>
        </div>
        <div class="card">
            <h3 class="font-bold mb-2">Most Used</h3>
            <div id="top-cmds" class="space-y-1 text-sm"></div>
        </div>
        <div class="card bg-black border-red-900/30">
            <h3 class="font-bold text-red-500 mb-2">Failed Tasks</h3>
            <p id="fail-count" class="font-mono text-2xl">0</p>
        </div>
    </div>

    <script>
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.remove('hidden');
            event.currentTarget.classList.add('active');
        }

        async function refreshData() {
            const status = await fetch('/api/status').then(r => r.json());
            document.getElementById('owner-num').innerText = '+' + status.owner;
            document.getElementById('ping-val').innerText = 'STABLE';
            document.getElementById('in-name').value = status.botName;
            document.getElementById('in-prefix').value = status.prefix;

            const features = await fetch('/api/features').then(r => r.json());
            const fList = document.getElementById('feature-list');
            fList.innerHTML = features.map(f => `
                <div class="card flex justify-between items-center mb-2">
                    <div>
                        <p class="font-bold">${f.name}</p>
                        <p class="text-[10px] text-gray-500">${f.category.toUpperCase()}</p>
                    </div>
                    <input type="checkbox" ${f.status ? 'checked' : ''} onchange="toggleFeature('${f.category}', '${f.id}', this.checked)">
                </div>
            `).join('');

            const analytics = await fetch('/api/analytics').then(r => r.json());
            document.getElementById('total-exec').innerText = analytics.totalExecuted;
            document.getElementById('fail-count').innerText = analytics.failed;
            document.getElementById('top-cmds').innerHTML = analytics.mostUsed.map(c => `<div class="flex justify-between"><span>!${c.name}</span><span class="text-gray-500">${c.count}</span></div>`).join('');
        }

        async function updateConfig() {
            const body = {
                name: document.getElementById('in-name').value,
                prefix: document.getElementById('in-prefix').value,
                thumbnail: document.getElementById('in-image').value
            };
            await fetch('/api/update-config', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
            alert('Success: Bot Identity Updated');
        }

        async function toggleFeature(category, id, status) {
            await fetch('/api/toggle-feature', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ category, id, status }) });
        }

        async function searchCmds() {
            const query = document.getElementById('cmd-search').value.toLowerCase();
            const cmds = await fetch('/api/commands').then(r => r.json());
            const filtered = cmds.filter(c => c.name.includes(query) || c.category.includes(query));
            document.getElementById('cmd-list').innerHTML = filtered.map(c => `
                <div class="bg-[#16121d] p-3 rounded-lg">
                    <p class="font-bold text-[#9747FF]">!${c.name}</p>
                    <p class="text-xs text-gray-400">${c.description}</p>
                    <p class="text-[9px] font-mono text-gray-600 mt-1 uppercase">${c.category}</p>
                </div>
            `).join('');
        }

        setInterval(refreshData, 5000);
        refreshData();
        searchCmds();
    </script>
</body>
</html>
