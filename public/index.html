<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstraX Enterprise | Management Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Source+Code+Pro&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #9747FF;
            --secondary: #82A9FF;
            --bg: #050406;
        }
        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
        }
        .tech-grid {
            background-image: linear-gradient(to right, #1a1a1a 1px, transparent 1px),
                              linear-gradient(to bottom, #1a1a1a 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .glow-text { text-shadow: 0 0 10px rgba(151, 71, 255, 0.5); }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .tab-active {
            border-bottom: 2px solid var(--primary);
            color: var(--primary);
        }
    </style>
</head>
<body class="tech-grid min-h-screen">
    <div class="max-w-7xl mx-auto p-6 space-y-8">
        <!-- Header -->
        <header class="flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-xl bg-purple-600 flex items-center justify-center shadow-[0_0_20px_rgba(151,71,255,0.4)]">
                    <span class="font-bold text-2xl">A</span>
                </div>
                <div>
                    <h1 class="text-3xl font-bold tracking-tighter glow-text">ASTRAX <span class="text-purple-500">ENTERPRISE</span></h1>
                    <p class="text-xs text-gray-500 font-mono tracking-widest uppercase">Node v1.2.5 [Stable]</p>
                </div>
            </div>
            <div id="status-badge" class="px-4 py-1 rounded-full bg-red-500/10 border border-red-500/20 text-red-500 text-xs font-bold uppercase tracking-tighter animate-pulse">
                Offline
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="glass-card p-4 rounded-2xl">
                <p class="text-[10px] text-gray-500 uppercase font-mono mb-1">Total Messages</p>
                <h3 id="stat-messages" class="text-2xl font-bold">0</h3>
            </div>
            <div class="glass-card p-4 rounded-2xl">
                <p class="text-[10px] text-gray-500 uppercase font-mono mb-1">Unique Modules</p>
                <h3 id="stat-commands" class="text-2xl font-bold">487</h3>
            </div>
            <div class="glass-card p-4 rounded-2xl">
                <p class="text-[10px] text-gray-500 uppercase font-mono mb-1">System Uptime</p>
                <h3 id="stat-uptime" class="text-2xl font-bold">0s</h3>
            </div>
            <div class="glass-card p-4 rounded-2xl border-purple-500/30">
                <p class="text-[10px] text-purple-400 uppercase font-mono mb-1">CPU Load</p>
                <h3 id="stat-cpu" class="text-2xl font-bold text-purple-500">0.00%</h3>
            </div>
        </div>

        <!-- Main Marketplace -->
        <div class="glass-card rounded-3xl overflow-hidden min-h-[600px] flex flex-col">
            <div class="p-6 border-b border-white/5 flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex gap-6 overflow-x-auto no-scrollbar">
                    <button onclick="switchTab('all')" class="tab-btn tab-active py-2 text-sm font-medium">All Modules</button>
                    <button onclick="switchTab('admin')" class="tab-btn py-2 text-sm font-medium text-gray-500 hover:text-white">Admin</button>
                    <button onclick="switchTab('ai')" class="tab-btn py-2 text-sm font-medium text-gray-500 hover:text-white">AI Matrix</button>
                    <button onclick="switchTab('economy')" class="tab-btn py-2 text-sm font-medium text-gray-500 hover:text-white">Economy</button>
                    <button onclick="switchTab('tools')" class="tab-btn py-2 text-sm font-medium text-gray-500 hover:text-white">Utilities</button>
                </div>
                <div class="relative w-full md:w-96 flex gap-2">
                    <input id="search-input" type="text" placeholder="Search commands, aliases..." class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-purple-500/50 transition-all">
                    <button onclick="triggerSearch()" class="bg-purple-600 hover:bg-purple-500 px-4 py-2 rounded-xl text-sm font-bold transition-colors">Search</button>
                </div>
            </div>
            <div id="command-grid" class="p-6 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4 overflow-y-auto">
                <!-- Commands inject here -->
                <div class="animate-pulse text-center col-span-full py-20 text-gray-500 font-mono uppercase tracking-widest text-xs">
                    Initializing Registry Swarm...
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let allCommands = [];

        socket.on('telemetry', (data) => {
            document.getElementById('stat-uptime').innerText = data.uptime + 's';
            document.getElementById('stat-cpu').innerText = data.cpu + '%';
            document.getElementById('status-badge').className = data.connected ? 
                'px-4 py-1 rounded-full bg-green-500/10 border border-green-500/20 text-green-500 text-xs font-bold uppercase tracking-tighter' :
                'px-4 py-1 rounded-full bg-red-500/10 border border-red-500/20 text-red-500 text-xs font-bold uppercase tracking-tighter animate-pulse';
            document.getElementById('status-badge').innerText = data.connected ? 'Online' : 'Offline';
        });

        async function initRegistry() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                document.getElementById('stat-commands').innerText = data.commands;
                // Fetch actual command list via new endpoint if available
                renderCommands(Array(487).fill({ name: 'Module', category: 'General', desc: 'Enterprise Logic' }));
            } catch (e) {}
        }

        function renderCommands(cmds) {
            const grid = document.getElementById('command-grid');
            grid.innerHTML = '';
            cmds.forEach(cmd => {
                grid.innerHTML += `
                    <div class="glass-card p-4 rounded-2xl hover:bg-white/5 transition-all cursor-pointer group">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] text-purple-400 font-mono uppercase">${cmd.category || 'Core'}</span>
                            <div class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]"></div>
                        </div>
                        <h4 class="font-bold text-lg mb-1 group-hover:text-purple-400 transition-colors">!${cmd.name}</h4>
                        <p class="text-xs text-gray-500 line-clamp-2">${cmd.desc || 'Standardized logical execution unit.'}</p>
                    </div>
                `;
            });
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('tab-active', 'text-white'));
            event.target.classList.add('tab-active', 'text-white');
            // Filtering logic here
        }

        function triggerSearch() {
            const q = document.getElementById('search-input').value.toLowerCase();
            console.log('Searching for:', q);
        }

        initRegistry();
    </script>
</body>
</html>
