<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstraX Master Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050406; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .tab-active { background: #9747FF; color: white; box-shadow: 0 0 15px rgba(151, 71, 255, 0.4); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: #10B981; box-shadow: 0 0 8px #10B981; }
        .offline { background: #EF4444; box-shadow: 0 0 8px #EF4444; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body class="p-4 pb-24">
    <!-- Header -->
    <header class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-2xl font-bold tracking-tight text-white">ASTRAX <span class="text-[#9747FF]">NODE</span></h1>
            <p id="node-platform" class="text-[10px] uppercase tracking-widest text-gray-500 font-mono">PROBING HOST...</p>
        </div>
        <div class="glass px-3 py-1 rounded-full flex items-center">
            <span class="status-dot online"></span>
            <span id="bot-status" class="text-[10px] font-bold uppercase">Ready</span>
        </div>
    </header>

    <!-- Main Content Area -->
    <div id="tab-1" class="tab-content space-y-4">
        <!-- Bot Health Card -->
        <div class="glass p-5 rounded-3xl space-y-4">
            <div class="flex items-center gap-4">
                <img id="bot-pic-view" src="https://placehold.co/100x100" class="w-16 h-16 rounded-2xl border border-white/10 object-cover">
                <div>
                    <h2 id="bot-name-view" class="text-xl font-bold">AstraX Bot</h2>
                    <p id="owner-num-view" class="text-sm text-gray-400">Owner: Not Set</p>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3 pt-2">
                <div class="bg-white/5 p-3 rounded-2xl text-center">
                    <p class="text-[10px] text-gray-500 uppercase">Latency</p>
                    <p id="ping-view" class="text-lg font-bold">--ms</p>
                </div>
                <div class="bg-white/5 p-3 rounded-2xl text-center">
                    <p class="text-[10px] text-gray-500 uppercase">Modules</p>
                    <p id="cmd-count-view" class="text-lg font-bold">--</p>
                </div>
            </div>
        </div>

        <!-- Quick Config -->
        <div class="glass p-5 rounded-3xl space-y-4">
            <h3 class="font-bold text-sm uppercase text-gray-400">Settings</h3>
            <div class="space-y-3">
                <input id="inp-name" type="text" placeholder="Bot Name" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl text-sm focus:outline-none focus:border-[#9747FF]">
                <input id="inp-prefix" type="text" placeholder="Prefix (e.g. !)" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl text-sm focus:outline-none focus:border-[#9747FF]">
                <input id="inp-img" type="text" placeholder="Image URL (Logo)" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl text-sm focus:outline-none focus:border-[#9747FF]">
                <button onclick="updateConfig()" class="w-full bg-[#9747FF] font-bold py-3 rounded-xl hover:opacity-90 transition-all">Save Changes</button>
            </div>
        </div>
    </div>

    <div id="tab-2" class="tab-content hidden space-y-4">
        <div class="glass p-5 rounded-3xl">
            <h3 class="font-bold text-sm uppercase text-gray-400 mb-4 text-center">Security & Tools</h3>
            <div id="feature-list" class="space-y-3">
                <!-- Toggles will be injected here -->
                <div class="animate-pulse flex justify-center py-10 text-gray-600">Loading Toggles...</div>
            </div>
        </div>
    </div>

    <div id="tab-3" class="tab-content hidden space-y-4">
        <div class="glass p-5 rounded-3xl">
            <input id="search-cmds" type="text" placeholder="Search commands..." class="w-full bg-white/5 border border-white/10 p-3 rounded-xl text-sm mb-4" onkeyup="searchCommands()">
            <div id="cmd-list" class="space-y-2 max-h-[60vh] overflow-y-auto pr-2">
                <!-- Commands injected here -->
            </div>
        </div>
    </div>

    <div id="tab-4" class="tab-content hidden space-y-4">
        <div class="grid grid-cols-2 gap-3">
            <div class="glass p-4 rounded-3xl text-center">
                <p class="text-[10px] text-gray-500 uppercase">Total Sent</p>
                <p id="stat-total" class="text-2xl font-bold">0</p>
            </div>
            <div class="glass p-4 rounded-3xl text-center">
                <p class="text-[10px] text-gray-500 uppercase">Failed</p>
                <p id="stat-failed" class="text-2xl font-bold text-red-400">0</p>
            </div>
        </div>
        <div class="glass p-5 rounded-3xl">
            <h3 class="font-bold text-sm uppercase text-gray-400 mb-3">Popular Commands</h3>
            <div id="stat-popular" class="space-y-2"></div>
        </div>
        <div class="glass p-5 rounded-3xl">
            <h3 class="font-bold text-sm uppercase text-gray-400 mb-3">Live System Logs</h3>
            <div id="log-container" class="bg-black/40 p-3 rounded-xl font-mono text-[10px] h-48 overflow-y-auto space-y-1">
                <div class="text-gray-500 italic">Waiting for events...</div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-4 left-4 right-4 glass rounded-full p-2 flex justify-between z-50 shadow-2xl border-white/10">
        <button onclick="switchTab(1)" class="nav-btn tab-active flex-1 py-3 rounded-full text-[10px] font-bold uppercase transition-all">Health</button>
        <button onclick="switchTab(2)" class="nav-btn flex-1 py-3 rounded-full text-[10px] font-bold uppercase transition-all">Safety</button>
        <button onclick="switchTab(3)" class="nav-btn flex-1 py-3 rounded-full text-[10px] font-bold uppercase transition-all">Finder</button>
        <button onclick="switchTab(4)" class="nav-btn flex-1 py-3 rounded-full text-[10px] font-bold uppercase transition-all">History</button>
    </nav>

    <script>
        const socket = io();
        let allCommands = [];

        // Tab Switching
        function switchTab(n) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(`tab-${n}`).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('tab-active'));
            event.target.classList.add('tab-active');
            
            if (n === 2) loadFeatures();
            if (n === 3) loadCommands();
            if (n === 4) loadAnalytics();
        }

        // Live Telemetry
        socket.on('telemetry', (data) => {
            document.getElementById('ping-view').innerText = `${Math.floor(Math.random() * 50) + 10}ms`; // Simulated network ping
            addLog(`[NODE] RAM: ${data.ram}MB | CPU: ${data.cpu}%`);
        });

        function addLog(msg) {
            const cont = document.getElementById('log-container');
            const div = document.createElement('div');
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            cont.appendChild(div);
            cont.scrollTop = cont.scrollHeight;
        }

        // Tab 1: Load Status
        async function loadStatus() {
            const res = await fetch('/api/status');
            const d = await res.json();
            document.getElementById('bot-name-view').innerText = d.botName;
            document.getElementById('owner-num-view').innerText = `Owner: ${d.owner}`;
            document.getElementById('cmd-count-view').innerText = d.totalTriggers;
            document.getElementById('bot-pic-view').src = d.thumbnail;
            document.getElementById('node-platform').innerText = `NODE: ${window.location.hostname}`;
            
            document.getElementById('inp-name').value = d.botName;
            document.getElementById('inp-prefix').value = d.prefix;
            document.getElementById('inp-img').value = d.thumbnail;
        }

        async function updateConfig() {
            const body = {
                name: document.getElementById('inp-name').value,
                prefix: document.getElementById('inp-prefix').value,
                thumbnail: document.getElementById('inp-img').value
            };
            const res = await fetch('/api/update-config', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
            if (res.ok) {
                alert('AstraX Node Updated!');
                loadStatus();
            }
        }

        // Tab 2: Features
        async function loadFeatures() {
            const res = await fetch('/api/features');
            const data = await res.json();
            const cont = document.getElementById('feature-list');
            cont.innerHTML = '';
            data.forEach(f => {
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between p-4 bg-white/5 rounded-2xl';
                div.innerHTML = `
                    <div>
                        <p class="font-bold text-sm">${f.name}</p>
                        <p class="text-[10px] text-gray-500">${f.category.toUpperCase()}</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" ${f.status ? 'checked' : ''} onchange="toggleFeature('${f.category}', '${f.id}', this.checked)" class="sr-only peer">
                        <div class="w-11 h-6 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#9747FF]"></div>
                    </label>
                `;
                cont.appendChild(div);
            });
        }

        async function toggleFeature(cat, id, status) {
            await fetch('/api/toggle-feature', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ category: cat, id: id, status: status })
            });
        }

        // Tab 3: Commands
        async function loadCommands() {
            const res = await fetch('/api/commands');
            allCommands = await res.json();
            renderCommands(allCommands);
        }

        function renderCommands(list) {
            const cont = document.getElementById('cmd-list');
            cont.innerHTML = '';
            list.forEach(c => {
                const div = document.createElement('div');
                div.className = 'p-3 bg-white/5 rounded-xl border border-white/5';
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <p class="font-bold text-[#9747FF]">!${c.name}</p>
                        <span class="text-[9px] bg-[#9747FF]/20 px-2 py-0.5 rounded-full text-[#9747FF]">${c.category}</span>
                    </div>
                    <p class="text-[10px] text-gray-400 mt-1">${c.description || 'No simple description available.'}</p>
                `;
                cont.appendChild(div);
            });
        }

        function searchCommands() {
            const q = document.getElementById('search-cmds').value.toLowerCase();
            const filtered = allCommands.filter(c => c.name.includes(q) || c.category.includes(q));
            renderCommands(filtered);
        }

        // Tab 4: Analytics
        async function loadAnalytics() {
            const res = await fetch('/api/analytics');
            const d = await res.json();
            document.getElementById('stat-total').innerText = d.totalExecuted.toLocaleString();
            document.getElementById('stat-failed').innerText = d.failed;
            
            const popCont = document.getElementById('stat-popular');
            popCont.innerHTML = '';
            d.mostUsed.forEach(m => {
                const div = document.createElement('div');
                div.className = 'flex justify-between text-xs bg-white/5 p-2 rounded-lg';
                div.innerHTML = `<span>!${m.name}</span><span class="text-gray-500">${m.count} uses</span>`;
                popCont.appendChild(div);
            });
        }

        // Initial Load
        loadStatus();
    </script>
</body>
</html>
