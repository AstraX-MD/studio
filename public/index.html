<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstraX Enterprise | System Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050406; color: #fff; }
        .font-headline { font-family: 'Space Grotesk', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glow-primary { box-shadow: 0 0 20px -5px rgba(151, 71, 255, 0.5); }
        .active-tab { background: rgba(151, 71, 255, 0.1); border-color: rgba(151, 71, 255, 0.4); color: #9747FF; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto space-y-8">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center glow-primary">
                    <span class="text-2xl">🌌</span>
                </div>
                <div>
                    <h1 class="text-3xl font-headline font-bold tracking-tighter">ASTRAX <span class="text-[#9747FF]">ENTERPRISE</span></h1>
                    <p class="text-xs text-muted-foreground uppercase tracking-widest font-mono opacity-60">v1.2.5 Operational Node</p>
                </div>
            </div>
            
            <!-- Search Hub -->
            <div class="relative w-full md:w-96 flex gap-2">
                <input id="searchInput" type="text" placeholder="Search Logic or Aliases..." class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-[#9747FF]/50 transition-all">
                <button onclick="triggerSearch()" class="bg-[#9747FF] text-white px-6 rounded-xl font-headline font-bold text-sm hover:opacity-90 transition-all">SEARCH</button>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="glass p-4 rounded-2xl">
                <p class="text-[10px] text-muted-foreground uppercase font-mono">System Status</p>
                <p class="text-xl font-headline font-bold text-green-500">ONLINE</p>
            </div>
            <div class="glass p-4 rounded-2xl">
                <p class="text-[10px] text-muted-foreground uppercase font-mono">Unique Logic</p>
                <p id="moduleCount" class="text-xl font-headline font-bold">482 Modules</p>
            </div>
            <div class="glass p-4 rounded-2xl">
                <p class="text-[10px] text-muted-foreground uppercase font-mono">Active Triggers</p>
                <p id="triggerCount" class="text-xl font-headline font-bold">954 Entry Points</p>
            </div>
            <div class="glass p-4 rounded-2xl">
                <p class="text-[10px] text-muted-foreground uppercase font-mono">Average Latency</p>
                <p class="text-xl font-headline font-bold text-[#82A9FF]">142ms</p>
            </div>
        </div>

        <!-- Main Marketplace Tabs -->
        <div class="space-y-4">
            <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar" id="tabList">
                <button onclick="switchTab('all')" class="px-6 py-2 rounded-xl glass text-sm font-headline active-tab" data-tab="all">ALL</button>
                <button onclick="switchTab('admin')" class="px-6 py-2 rounded-xl glass text-sm font-headline" data-tab="admin">ADMIN</button>
                <button onclick="switchTab('ai')" class="px-6 py-2 rounded-xl glass text-sm font-headline" data-tab="ai">AI</button>
                <button onclick="switchTab('economy')" class="px-6 py-2 rounded-xl glass text-sm font-headline" data-tab="economy">ECONOMY</button>
                <button onclick="switchTab('security')" class="px-6 py-2 rounded-xl glass text-sm font-headline" data-tab="security">WARDEN</button>
                <button onclick="switchTab('tools')" class="px-6 py-2 rounded-xl glass text-sm font-headline" data-tab="tools">UTILITY</button>
            </div>

            <!-- Command Grid -->
            <div id="commandGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Commands injected by JS -->
            </div>
        </div>
    </div>

    <script>
        let commands = [];
        let activeTab = 'all';

        async function init() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                document.getElementById('moduleCount').innerText = `${data.commands} Unique Logic`;
                document.getElementById('triggerCount').innerText = `${data.commands * 2} Triggers`;
                
                // Simulated command fetch
                commands = [
                    { name: 'ping', desc: 'Latency check.', cat: 'utility', aliases: ['p', 'latency'] },
                    { name: 'play', desc: 'YouTube downloader.', cat: 'tools', aliases: ['song', 'ytmp3'] },
                    { name: 'gpt4', desc: 'Advanced AI chat.', cat: 'ai', aliases: ['ask', 'openai'] },
                    { name: 'ban', desc: 'Remove user.', cat: 'admin', aliases: ['kick'] },
                    { name: 'bal', desc: 'Check money.', cat: 'economy', aliases: ['wallet', 'bank'] },
                    { name: 'antilink', desc: 'Warden protection.', cat: 'security', aliases: ['al', 'lock'] }
                ];
                render();
            } catch (e) { console.error(e); }
        }

        function switchTab(tab) {
            activeTab = tab;
            document.querySelectorAll('[data-tab]').forEach(btn => {
                btn.classList.remove('active-tab');
                if(btn.dataset.tab === tab) btn.classList.add('active-tab');
            });
            render();
        }

        function triggerSearch() { render(); }

        function render() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('commandGrid');
            grid.innerHTML = '';

            const filtered = commands.filter(c => {
                const matchesTab = activeTab === 'all' || c.cat === activeTab;
                const matchesQuery = !query || 
                    c.name.includes(query) || 
                    c.desc.toLowerCase().includes(query) || 
                    c.aliases.some(a => a.includes(query));
                return matchesTab && matchesQuery;
            });

            filtered.forEach(c => {
                grid.innerHTML += `
                    <div class="glass p-6 rounded-2xl hover:border-[#9747FF]/30 transition-all group">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="text-lg font-headline font-bold">!${c.name}</h3>
                            <span class="text-[10px] px-2 py-1 bg-white/5 rounded-full uppercase font-mono">${c.cat}</span>
                        </div>
                        <p class="text-xs text-muted-foreground leading-relaxed mb-4">${c.desc}</p>
                        <div class="text-[9px] font-mono opacity-40">ALIASES: ${c.aliases.join(', ')}</div>
                    </div>
                `;
            });
        }

        init();
    </script>
</body>
</html>
