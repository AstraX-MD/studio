<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstraX Master Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #050406; color: #fff; }
        .tab-btn.active { border-bottom: 3px solid #9747FF; color: #9747FF; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glow { box-shadow: 0 0 15px rgba(151, 71, 255, 0.3); }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <!-- Header -->
    <header class="text-center mb-8 pt-4">
        <div class="w-16 h-16 bg-purple-600 rounded-2xl mx-auto flex items-center justify-center glow mb-4">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        </div>
        <h1 class="text-4xl font-bold font-['Space_Grotesk'] tracking-tighter">ASTRAX</h1>
        <p class="text-gray-500 text-sm">Expert Control Panel</p>
    </header>

    <!-- Navigation Tabs -->
    <div class="flex justify-between border-b border-white/10 mb-8 overflow-x-auto no-scrollbar">
        <button onclick="showTab('status')" id="btn-status" class="tab-btn active px-4 py-2 font-semibold transition-all">Health</button>
        <button onclick="showTab('safety')" id="btn-safety" class="tab-btn px-4 py-2 font-semibold transition-all">Safety</button>
        <button onclick="showTab('search')" id="btn-search" class="tab-btn px-4 py-2 font-semibold transition-all">Search</button>
        <button onclick="showTab('stats')" id="btn-stats" class="tab-btn px-4 py-2 font-semibold transition-all">History</button>
    </div>

    <!-- Tab 1: Health -->
    <div id="tab-status" class="tab-content space-y-6">
        <div class="grid grid-cols-2 gap-4">
            <div class="glass p-4 rounded-2xl">
                <p class="text-gray-500 text-xs uppercase font-bold">Owner</p>
                <p id="owner-num" class="text-lg font-mono text-purple-400">Loading...</p>
            </div>
            <div class="glass p-4 rounded-2xl">
                <p class="text-gray-500 text-xs uppercase font-bold">Speed</p>
                <p id="bot-ping" class="text-lg font-mono text-green-400">14ms</p>
            </div>
        </div>

        <div class="glass p-6 rounded-3xl space-y-6">
            <h3 class="text-xl font-bold font-['Space_Grotesk']">Quick Settings</h3>
            
            <div class="space-y-2">
                <label class="text-xs text-gray-400 font-bold uppercase">Bot Display Name</label>
                <input id="set-name" type="text" placeholder="AstraX" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 outline-none focus:border-purple-500">
            </div>

            <div class="space-y-2">
                <label class="text-xs text-gray-400 font-bold uppercase">Command Prefix</label>
                <input id="set-prefix" type="text" placeholder="!" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 outline-none focus:border-purple-500">
            </div>

            <div class="space-y-2">
                <label class="text-xs text-gray-400 font-bold uppercase">Picture Link</label>
                <input id="set-pic" type="text" placeholder="https://..." class="w-full bg-white/5 border border-white/10 rounded-xl p-3 outline-none focus:border-purple-500">
            </div>

            <button onclick="updateConfig()" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold p-4 rounded-2xl transition-all active:scale-95">Save Changes</button>
        </div>
    </div>

    <!-- Tab 2: Safety -->
    <div id="tab-safety" class="tab-content hidden space-y-4">
        <div id="feature-list" class="space-y-3">
            <!-- Features populated by JS -->
        </div>
    </div>

    <!-- Tab 3: Search -->
    <div id="tab-search" class="tab-content hidden space-y-4">
        <div class="relative">
            <input id="search-box" onkeyup="searchCommands()" type="text" placeholder="Search commands..." class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 pl-12 outline-none focus:border-purple-500">
            <svg class="w-6 h-6 absolute left-4 top-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>
        <div id="command-list" class="space-y-3 max-h-[60vh] overflow-y-auto no-scrollbar">
            <!-- Commands populated by JS -->
        </div>
    </div>

    <!-- Tab 4: History -->
    <div id="tab-stats" class="tab-content hidden space-y-6">
        <div class="glass p-6 rounded-3xl text-center">
            <p id="total-exec" class="text-5xl font-extrabold text-purple-500 font-['Space_Grotesk']">0</p>
            <p class="text-gray-400 text-sm mt-2 uppercase tracking-widest font-bold">Total Commands Sent</p>
        </div>

        <div class="space-y-4">
            <h4 class="text-sm font-bold uppercase text-gray-500 pl-2">Top Features</h4>
            <div id="most-used" class="space-y-2">
                <!-- Most used populated by JS -->
            </div>
        </div>

        <div class="glass p-4 rounded-2xl border-l-4 border-red-500 bg-red-500/5">
            <p class="text-gray-400 text-xs">FAILED COMMANDS</p>
            <p id="failed-count" class="text-xl font-bold">0</p>
        </div>
    </div>

    <script>
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.remove('hidden');
            document.getElementById('btn-' + id).classList.add('active');
        }

        async function loadStatus() {
            const res = await fetch('/api/status');
            const d = await res.json();
            document.getElementById('owner-num').innerText = '+' + d.owner;
            document.getElementById('set-name').value = d.botName;
            document.getElementById('set-prefix').value = d.prefix;
        }

        async function loadFeatures() {
            const res = await fetch('/api/features');
            const list = await res.json();
            const container = document.getElementById('feature-list');
            container.innerHTML = list.map(f => `
                <div class="glass p-4 rounded-2xl flex items-center justify-between">
                    <div>
                        <p class="font-bold">${f.name}</p>
                        <p class="text-[10px] text-gray-500 uppercase">${f.category}</p>
                    </div>
                    <button onclick="toggleFeature('${f.category}', '${f.id}', ${!f.status})" class="w-12 h-6 rounded-full transition-all ${f.status ? 'bg-purple-600' : 'bg-gray-700'} relative">
                        <div class="w-4 h-4 bg-white rounded-full absolute top-1 transition-all ${f.status ? 'right-1' : 'left-1'}"></div>
                    </button>
                </div>
            `).join('');
        }

        async function toggleFeature(category, id, status) {
            await fetch('/api/toggle-feature', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ category, id, status })
            });
            loadFeatures();
        }

        async function loadCommands() {
            const res = await fetch('/api/commands');
            const data = await res.json();
            window.allCommands = data;
            renderCommands(data);
        }

        function renderCommands(list) {
            const container = document.getElementById('command-list');
            container.innerHTML = list.map(c => `
                <div class="glass p-4 rounded-2xl">
                    <p class="text-purple-400 font-bold">!${c.name}</p>
                    <p class="text-gray-400 text-xs">${c.description}</p>
                    <p class="text-[10px] text-gray-600 mt-2">ALIASE: ${c.aliases.join(', ') || 'NONE'}</p>
                </div>
            `).join('');
        }

        function searchCommands() {
            const q = document.getElementById('search-box').value.toLowerCase();
            const filtered = window.allCommands.filter(c => 
                c.name.toLowerCase().includes(q) || 
                c.aliases.some(a => a.toLowerCase().includes(q))
            );
            renderCommands(filtered);
        }

        async function loadAnalytics() {
            const res = await fetch('/api/analytics');
            const d = await res.json();
            document.getElementById('total-exec').innerText = d.totalExecuted;
            document.getElementById('failed-count').innerText = d.failed;
            
            const container = document.getElementById('most-used');
            container.innerHTML = d.mostUsed.map(m => `
                <div class="flex items-center justify-between p-2">
                    <span class="text-sm">!${m.name}</span>
                    <span class="text-gray-500 font-mono text-xs">${m.count} uses</span>
                </div>
            `).join('');
        }

        async function updateConfig() {
            const name = document.getElementById('set-name').value;
            const prefix = document.getElementById('set-prefix').value;
            const thumbnail = document.getElementById('set-pic').value;
            
            await fetch('/api/update-config', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, prefix, thumbnail })
            });
            alert('Settings Saved Successfully');
        }

        // Init
        loadStatus();
        loadFeatures();
        loadCommands();
        loadAnalytics();
        setInterval(loadAnalytics, 5000);
    </script>
</body>
</html>
