<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AstraX Master Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #050406; color: #fff; }
        .tab-content { display: none; padding-bottom: 80px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-active { color: #9747FF; border-top: 2px solid #9747FF; }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; }
        .btn-glow { box-shadow: 0 0 15px rgba(151, 71, 255, 0.3); }
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #9747FF; }
        input:checked + .slider:before { transform: translateX(24px); }
    </style>
</head>
<body>

    <!-- TOP HEADER -->
    <header class="p-6 border-b border-white/5 bg-black/50 backdrop-blur-md sticky top-0 z-50">
        <h1 class="text-2xl font-black tracking-tighter text-cyan-400">ASTRAX <span class="text-white">NODE</span></h1>
        <p id="status-text" class="text-[10px] uppercase tracking-widest text-green-500 font-bold">● System Online</p>
    </header>

    <main class="p-4">

        <!-- TAB 1: BOT HEALTH -->
        <div id="health" class="tab-content active space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="glass p-4 text-center">
                    <p class="text-[10px] text-gray-400 uppercase">Owner</p>
                    <p id="owner-val" class="font-bold text-sm">Loading...</p>
                </div>
                <div class="glass p-4 text-center">
                    <p class="text-[10px] text-gray-400 uppercase">Speed</p>
                    <p id="ping-val" class="font-bold text-sm text-green-400">142ms</p>
                </div>
            </div>

            <div class="glass p-6 space-y-4">
                <h3 class="font-bold text-lg">Change Bot Details</h3>
                <div class="space-y-2">
                    <label class="text-xs text-gray-500 uppercase">Bot Name</label>
                    <input id="inp-name" type="text" placeholder="AstraX" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl focus:outline-none focus:border-purple-500">
                </div>
                <div class="space-y-2">
                    <label class="text-xs text-gray-500 uppercase">Prefix</label>
                    <input id="inp-prefix" type="text" placeholder="!" class="w-full bg-white/5 border border-white/10 p-3 rounded-xl">
                </div>
                <div class="space-y-2">
                    <label class="text-xs text-gray-500 uppercase">Bot Picture (Link)</label>
                    <input id="inp-img" type="text" placeholder="https://..." class="w-full bg-white/5 border border-white/10 p-3 rounded-xl">
                </div>
                <button onclick="updateConfig()" class="w-full bg-purple-600 p-4 rounded-xl font-bold btn-glow">Save Changes</button>
            </div>
        </div>

        <!-- TAB 2: SAFETY -->
        <div id="safety" class="tab-content space-y-4">
            <h3 class="text-xl font-bold px-2">Safety Switches</h3>
            <div id="feature-list" class="space-y-3">
                <!-- Dynamic Toggles -->
            </div>
        </div>

        <!-- TAB 3: COMMANDS -->
        <div id="commands" class="tab-content space-y-4">
            <div class="sticky top-20 z-40 bg-black/80 pb-2">
                <input type="text" id="cmd-search" placeholder="Search 490+ commands..." class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl">
            </div>
            <div id="cmd-list" class="space-y-2">
                <!-- Dynamic Commands -->
            </div>
        </div>

        <!-- TAB 4: STATS -->
        <div id="stats" class="tab-content space-y-6">
            <div class="glass p-6 text-center space-y-2">
                <p class="text-4xl font-black text-purple-500" id="total-sent">0</p>
                <p class="text-xs text-gray-400 uppercase tracking-widest">Total Commands Used</p>
            </div>

            <div class="glass p-4 space-y-4">
                <h4 class="font-bold text-sm uppercase text-gray-500">Popular Tools</h4>
                <div id="top-cmds" class="space-y-2"></div>
            </div>

            <div class="bg-black border border-white/10 rounded-2xl p-4 h-64 overflow-y-auto font-mono text-[10px] space-y-1" id="logs">
                <p class="text-gray-500">[System] Log stream started...</p>
            </div>
        </div>

    </main>

    <!-- BOTTOM TABS -->
    <nav class="fixed bottom-0 left-0 right-0 h-20 bg-black/90 border-t border-white/10 backdrop-blur-xl flex justify-around items-center z-50 px-4">
        <button onclick="showTab('health', this)" class="flex flex-col items-center gap-1 text-gray-500 nav-active transition-all">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
            <span class="text-[9px] font-bold uppercase">Health</span>
        </button>
        <button onclick="showTab('safety', this)" class="flex flex-col items-center gap-1 text-gray-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            <span class="text-[9px] font-bold uppercase">Safety</span>
        </button>
        <button onclick="showTab('commands', this)" class="flex flex-col items-center gap-1 text-gray-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <span class="text-[9px] font-bold uppercase">Tools</span>
        </button>
        <button onclick="showTab('stats', this)" class="flex flex-col items-center gap-1 text-gray-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
            <span class="text-[9px] font-bold uppercase">Stats</span>
        </button>
    </nav>

    <script>
        const socket = io();
        let allCommands = [];

        function showTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
            btn.classList.add('nav-active');
        }

        async function init() {
            const status = await fetch('/api/status').then(r => r.json());
            document.getElementById('owner-val').innerText = '@' + status.owner;
            document.getElementById('inp-name').value = status.botName;
            document.getElementById('inp-prefix').value = status.prefix;
            document.getElementById('inp-img').value = status.thumbnail || '';

            const features = await fetch('/api/features').then(r => r.json());
            const featDiv = document.getElementById('feature-list');
            featDiv.innerHTML = features.map(f => `
                <div class="glass p-4 flex justify-between items-center">
                    <div>
                        <p class="font-bold text-sm">${f.name}</p>
                        <p class="text-[10px] text-gray-500 uppercase">${f.category}</p>
                    </div>
                    <label class="switch">
                        <input type="checkbox" ${f.status ? 'checked' : ''} onchange="toggleFeature('${f.category}', '${f.id}', this.checked)">
                        <span class="slider"></span>
                    </label>
                </div>
            `).join('');

            allCommands = await fetch('/api/commands').then(r => r.json());
            renderCommands(allCommands);

            const analytics = await fetch('/api/analytics').then(r => r.json());
            document.getElementById('total-sent').innerText = analytics.totalExecuted;
            document.getElementById('top-cmds').innerHTML = analytics.mostUsed.map(c => `
                <div class="flex justify-between text-xs p-2 border-b border-white/5">
                    <span class="text-purple-400 font-bold">!${c.name}</span>
                    <span class="text-gray-500">${c.count} times</span>
                </div>
            `).join('');
        }

        function renderCommands(list) {
            const div = document.getElementById('cmd-list');
            div.innerHTML = list.map(c => `
                <div class="glass p-4 space-y-1">
                    <div class="flex justify-between">
                        <span class="text-cyan-400 font-bold text-sm">!${c.name}</span>
                        <span class="text-[9px] bg-white/5 px-2 py-0.5 rounded text-gray-400 uppercase">${c.category}</span>
                    </div>
                    <p class="text-[11px] text-gray-400 leading-relaxed">${c.description}</p>
                    <p class="text-[9px] text-gray-600 italic">Alias: ${c.aliases.join(', ') || 'None'}</p>
                </div>
            `).join('');
        }

        async function updateConfig() {
            const data = {
                name: document.getElementById('inp-name').value,
                prefix: document.getElementById('inp-prefix').value,
                thumbnail: document.getElementById('inp-img').value
            };
            await fetch('/api/update-config', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            alert('Settings Saved!');
        }

        async function toggleFeature(category, id, status) {
            await fetch('/api/toggle-feature', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({category, id, status})
            });
        }

        document.getElementById('cmd-search').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            const filtered = allCommands.filter(c => c.name.includes(q) || c.category.includes(q));
            renderCommands(filtered);
        });

        socket.on('telemetry', (data) => {
            const logs = document.getElementById('logs');
            const p = document.createElement('p');
            p.className = 'text-gray-400';
            p.innerText = `[${new Date().toLocaleTimeString()}] Active: RAM ${data.ram}MB | CPU ${data.cpu}%`;
            logs.prepend(p);
            if(logs.children.length > 50) logs.lastChild.remove();
        });

        init();
    </script>
</body>
</html>
