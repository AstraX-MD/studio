<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstraX Enterprise | Command Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #050406; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glow-primary { box-shadow: 0 0 20px -5px rgba(151, 71, 255, 0.5); }
        .tab-active { border-bottom: 2px solid #9747FF; color: #9747FF; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto space-y-8">
        <!-- Header -->
        <header class="flex justify-between items-center bg-white/5 p-6 rounded-3xl border border-white/10">
            <div>
                <h1 class="text-3xl font-bold tracking-tighter">ASTRAX <span class="text-purple-500">ENTERPRISE</span></h1>
                <p class="text-gray-400 text-sm">v1.2.5 Stability Architecture</p>
            </div>
            <div class="flex gap-4">
                <div class="px-4 py-2 bg-green-500/10 border border-green-500/20 rounded-xl text-green-500 text-xs font-bold uppercase tracking-widest flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                    System Online
                </div>
            </div>
        </header>

        <!-- Search Hub -->
        <div class="glass p-6 rounded-3xl space-y-4">
            <div class="flex gap-4">
                <input type="text" id="searchInput" placeholder="Search commands or aliases (e.g. 'play', 'eco')..." class="flex-1 bg-white/5 border border-white/10 p-4 rounded-2xl focus:outline-none focus:border-purple-500 transition-all">
                <button onclick="performSearch()" class="px-8 bg-purple-600 rounded-2xl font-bold hover:bg-purple-500 transition-all glow-primary">Search</button>
            </div>
        </div>

        <!-- Command Tabs -->
        <div class="glass rounded-3xl overflow-hidden">
            <div class="flex border-b border-white/10 bg-white/5 overflow-x-auto" id="tabsHeader">
                <!-- Tabs will be injected here -->
            </div>
            <div class="p-6 min-h-[400px]" id="commandGrid">
                <!-- Commands will be injected here -->
            </div>
        </div>
    </div>

    <script>
        let allCommands = [];
        let currentCategory = 'all';

        async function fetchManifest() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                // In production this would fetch the manifest via bot.getCommandManifest()
                // For demo, we simulate with the data we have.
                renderTabs(['Admin', 'AI', 'Economy', 'Downloaders', 'Logos', 'Tools', 'Utility']);
            } catch (e) {
                console.error("Manifest Error", e);
            }
        }

        function renderTabs(categories) {
            const header = document.getElementById('tabsHeader');
            header.innerHTML = `<button onclick="setTab('all')" class="px-6 py-4 text-sm font-bold uppercase tracking-widest hover:bg-white/5 transition-all tab-btn" id="tab-all">All</button>` + 
                categories.map(c => `<button onclick="setTab('${c.toLowerCase()}')" class="px-6 py-4 text-sm font-bold uppercase tracking-widest hover:bg-white/5 transition-all tab-btn" id="tab-${c.toLowerCase()}">${c}</button>`).join('');
            setTab('all');
        }

        function setTab(cat) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(`tab-${cat}`).classList.add('tab-active');
            currentCategory = cat;
            // Simulated command display
            const grid = document.getElementById('commandGrid');
            grid.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="p-4 bg-white/5 border border-white/10 rounded-2xl hover:border-purple-500/50 transition-all cursor-pointer">
                    <h3 class="font-bold text-purple-400">!ping</h3>
                    <p class="text-xs text-gray-400">Check engine latency.</p>
                    <span class="text-[10px] bg-white/10 px-2 py-1 rounded-md mt-2 inline-block">Alias: p, latency</span>
                </div>
                <div class="p-4 bg-white/5 border border-white/10 rounded-2xl hover:border-purple-500/50 transition-all cursor-pointer">
                    <h3 class="font-bold text-purple-400">!gold</h3>
                    <p class="text-xs text-gray-400">Generate gold logo.</p>
                    <span class="text-[10px] bg-white/10 px-2 py-1 rounded-md mt-2 inline-block">Category: Logos</span>
                </div>
            </div>`;
        }

        function performSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            console.log("Searching for:", query);
            // Logic to filter the DOM nodes
        }

        fetchManifest();
    </script>
</body>
</html>
